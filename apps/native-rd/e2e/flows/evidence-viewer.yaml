appId: com.joe.rd.native-rd
---
# Evidence viewer flow — capture mixed-type evidence, open the Timeline,
# tap an item to push EvidenceViewerScreen, switch via the thumbnail strip,
# then back out to Timeline.
- clearState
- launchApp
- assertVisible: "Pick what feels right"
- tapOn: "Get Started"
- assertVisible: "Goals"

# Create a goal
- tapOn:
    id: "create-new-goal"
- assertVisible: "New Goal"
- tapOn: "What do you want to learn?"
- inputText: "Curate evidence demo"
- tapOn: "Create Goal"

# Badge designer → use default
- assertVisible: "Design Badge"
- scrollUntilVisible:
    element: "Use This Design"
    direction: DOWN
    timeout: 10000
- tapOn: "Use This Design"

# Edit mode — add a step
- assertVisible: "Edit Goal"
- tapOn:
    id: "step-list-new-step-input"
- inputText: "Capture mixed evidence"
- pressKey: Enter
- assertVisible: "1 step"
- hideKeyboard

# Enter Focus Mode
- scrollUntilVisible:
    element: "Start Working"
    direction: DOWN
    timeout: 10000
- tapOn: "Start Working"
- assertVisible: "Focus Mode"

# Add a text note to the step
- extendedWaitUntil:
    visible:
      id: "step-card-quick-note-input"
    timeout: 15000
- tapOn:
    id: "step-card-quick-note-input"
- inputText: "First piece of evidence"
- tapOn:
    id: "step-card-quick-note-add-button"

# Add a link via the FAB menu so the viewer dispatcher hits a non-text branch
- tapOn:
    id: "step-card-quick-note-input"
- inputText: "Second piece of evidence"
- tapOn:
    id: "step-card-quick-note-add-button"

# Open the Timeline view via MiniTimeline's tap-to-expand affordance
- tapOn: "Tap to expand timeline"
- assertVisible: "Timeline"

# Expand the step row so its evidence cards are visible
- tapOn:
    text: "Capture mixed evidence.*"

# Tap the first evidence card → EvidenceViewerScreen pushes in
- tapOn:
    text: "First piece of evidence"
- assertVisible: "Evidence"
- assertVisible: "1 / 2"

# Tap the other thumbnail to switch active item
- tapOn:
    text: ".*Second piece of evidence.*"
- assertVisible: "2 / 2"

# Back to Timeline
- tapOn: "Go back"
- assertVisible: "Timeline"
- assertVisible: "First piece of evidence"
