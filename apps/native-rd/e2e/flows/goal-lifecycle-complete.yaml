appId: com.joe.rd.native-rd
---
# Goal lifecycle flow — create goal, choose badge design, add step, complete step with evidence, and save final goal evidence note
# Status: required
# Criteria: stable feature, outcome assertions at each transition, deterministic selectors for lifecycle actions
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Pick what feels right"
- tapOn: "The Full Ride. Standard theme"
- tapOn: "Get Started"
- assertVisible: "Goals"
- tapOn:
    id: "create-new-goal"
- assertVisible: "New Goal"
- tapOn:
    id: "new-goal-title"
- inputText:
    id: "new-goal-title"
    text: "Plan community archive exhibit"
- tapOn:
    id: "create-goal"
- assertVisible: "Design Badge"
- scrollUntilVisible:
    element:
      id: "use-this-design"
    direction: DOWN
- tapOn:
    id: "use-this-design"
- assertVisible: "Edit Goal"
- tapOn:
    id: "new-step-title-input"
- inputText: "Draft exhibit outline"
- tapOn:
    id: "add-step-button"
- assertVisible: "Draft exhibit outline"
- assertVisible: "1 step"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "start-working"
    direction: DOWN
- tapOn:
    id: "start-working"
- assertVisible: "Focus Mode"
- assertVisible:
    id: "current-step-quick-note-input"
- tapOn:
    id: "current-step-quick-note-input"
- inputText:
    id: "current-step-quick-note-input"
    text: "Outlined the key sections and supporting artifacts."
- pressKey: enter
- tapOn:
    text: "Mark complete.*"
- assertVisible:
    id: "completion-note-input"
- tapOn:
    id: "completion-note-input"
- inputText: "Finished the archive exhibit plan and documented the result."
# Dismiss the soft keyboard by tapping the static header — Maestro's `hideKeyboard`
# cannot find a dismiss affordance here, and the keyboard intercepts the save tap.
- tapOn: "One last thing!"
- scrollUntilVisible:
    element:
      id: "save-completion-note"
    direction: DOWN
- tapOn:
    id: "save-completion-note"
# Assert on the BadgeEarnedModal's composed accessibilityLabel. The modal
# auto-appears once badgeStatus === "done" and occludes the celebration
# headline ("You did it!"), so `assertVisible` on that text hit-test-fails.
# The outer card wraps `accessible + accessibilityLabel="Badge earned"`, which
# collapses nested button text into one a11y node — asserting on the composed
# label is the correct handle (per the maestro-e2e skill's "match the full
# composed accessibilityLabel" rule). Its presence proves the pipeline: save →
# evidence persisted → phase transitioned to celebration → badge created.
- extendedWaitUntil:
    visible: "Badge earned"
    timeout: 15000
