name: CI - Native RD

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/native-rd/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "packages/openbadges-types/**"
      - "bun.lock"
      - ".github/workflows/ci-native-rd.yml"
  push:
    branches: [main]
    paths:
      - "apps/native-rd/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "packages/openbadges-types/**"
      - "bun.lock"
      - ".github/workflows/ci-native-rd.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-native-rd:
    name: Typecheck, Lint & Test (native-rd)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        run: bun run turbo build --filter=native-rd^...

      - name: Typecheck
        run: bun run turbo type-check --filter=native-rd

      - name: Lint
        run: bun run turbo lint --filter=native-rd

      - name: Validate test discovery
        working-directory: apps/native-rd
        run: bun run test:ci:smoke
