# See docs/infrastructure/mac-mini-runner-setup.md for runner provisioning.
name: E2E - Native RD

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/native-rd/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "packages/openbadges-types/**"
      - ".github/workflows/e2e-native-rd.yml"
  push:
    branches: [main]
    paths:
      - "apps/native-rd/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "packages/openbadges-types/**"
      - ".github/workflows/e2e-native-rd.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-native-rd:
    name: Maestro E2E (native-rd)
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    runs-on: [self-hosted, macOS, e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace dependencies
        run: bun run turbo build --filter=native-rd^...

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" 2>/dev/null || \
            xcrun simctl list devices | grep -q "iPhone 16.*Booted"

      - name: Build and install app
        working-directory: apps/native-rd
        run: npx expo run:ios --no-install

      - name: Run Maestro E2E flows
        working-directory: apps/native-rd
        run: bun run test:e2e

      - name: Upload Maestro screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: ~/.maestro/tests/
          retention-days: 7
