version: 2
updates:
  # Root package.json and bun.lock
  # Dependabot now natively supports Bun (GA Feb 2025)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    groups:
      # Group development dependency patch/minor updates together to reduce PR
      # noise while leaving major updates as individual migration PRs.
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      # Group production dependency patch/minor updates separately for easier
      # review while leaving major updates as individual migration PRs.
      production-dependencies:
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    ignore:
      # Pinned pending decision on the rd-logger Express adapter (issue tracking
      # whether we keep the adapter and bump to Express 5 or drop it entirely).
      # Express 4 → 5 is a breaking change in middleware/error-handling APIs and
      # the adapter would need a real port + a major rd-logger release.
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/express"
        update-types: ["version-update:semver-major"]
      # @hono/node-server is only consumed by rd-logger's own Hono adapter
      # integration test; the v1 → v2 jump is breaking and lives in the same
      # adapter-fate decision.
      - dependency-name: "@hono/node-server"
        update-types: ["version-update:semver-major"]
      # Vite 7+ / Vitest 4 cause CI failures for our apps:
      # - Vite 8 stricter ESM resolution breaks zod's named exports under our
      #   server vitest config (z.object → undefined).
      # - Vitest 4's new forks-by-default worker pool times out under Bun.
      # Tracked in the vite/vitest migration issue; remove these ignores when
      # the migration lands.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-istanbul"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/ui"
        update-types: ["version-update:semver-major"]
      # Plugins whose latest majors require Vite 7+; pinned alongside Vite.
      - dependency-name: "vite-plugin-vue-inspector"
        update-types: ["version-update:semver-major"]
      - dependency-name: "unplugin-auto-import"
        update-types: ["version-update:semver-major"]
      - dependency-name: "unplugin-vue-components"
        update-types: ["version-update:semver-major"]
      - dependency-name: "unplugin-vue-router"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    # Limit open PRs to avoid overwhelming the team
    open-pull-requests-limit: 10
    # Automatically rebase PRs when the base branch updates
    rebase-strategy: "auto"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
    # Limit open PRs
    open-pull-requests-limit: 5
    # Automatically rebase PRs when the base branch updates
    rebase-strategy: "auto"
