appId: com.joe.rd.native-rd
---
# Lina's Quiet Victory — create a goal, mark it complete
#
# NOTE: "Mark Complete" flow is aspirational — the app currently navigates
# to EditMode after creation. Steps beyond "Create Goal" will need updating
# once the goal detail / completion UI is built.
- launchApp
- assertVisible: "Goals"
- tapOn:
    id: "create-new-goal"
- assertVisible: "New Goal"
- tapOn: "What do you want to learn?"
- inputText: "Reorganize Local History section"
- tapOn: "Create Goal"
